{% extends "base.html" %}

{% block title %}Remove Item - Django HX Forms Demo{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white shadow-md rounded-lg overflow-hidden">
        <div class="bg-red-600 text-white px-6 py-4">
            <h2 class="text-2xl font-bold">Remove from Cart</h2>
        </div>
        <div class="px-6 py-6">
            <p class="text-gray-700 mb-4">Are you sure you want to remove this item from your cart?</p>
            <div class="bg-yellow-50 border-l-4 border-yellow-400 p-4 mb-4">
                <p class="font-semibold text-yellow-900">{{ product }}</p>
            </div>
            <p class="text-sm text-gray-600 mb-6">This action cannot be undone.</p>

            <form method="post">
                {% csrf_token %}
                <div class="flex space-x-3">
                    <button type="submit" class="bg-red-600 hover:bg-red-700 text-white font-semibold px-6 py-2 rounded-lg transition">
                        Yes, Remove
                    </button>
                    <a href="{% url 'shopping_cart:item-list' %}" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold px-6 py-2 rounded-lg transition">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
